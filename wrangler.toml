name = "whiteflows-elite-api"
main = "server.py"
compatibility_date = "2026-04-22"
compatibility_flags = ["python_workers"]

# Cloudflare D1 Database Binding
[[d1_databases]]
binding = "DB" # Accessible as env.DB in Python
database_name = "whiteflows_prod"
database_id = "1c17ae2f-e533-4a00-9174-c23c034fffbe"

# Environment Variables
[vars]
GMAIL_RECEIVER = "whiteflowsint@gmail.com"
# Secrets (Run 'wrangler secret put <KEY>' for these):
# - BREVO_API_KEY
# - RESEND_API_KEY
# - ADMIN_PASSWORD
# - JWT_SECRET

[observability]
enabled = true
